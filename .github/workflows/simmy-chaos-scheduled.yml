# Scheduled Simmy chaos coverage (LLM retry + CB composition, SQL, blob). See docs/LLM_RETRY_AND_CIRCUIT_BREAKER.md.
name: Simmy chaos (scheduled)

on:
  schedule:
    - cron: "0 5 * * 3"
  workflow_dispatch:
    inputs:
      scenario_id:
        description: "Short label for the game day (recorded in the job summary)."
        required: false
        default: "scheduled"
      environment:
        description: "Target posture (staging-only default; production requires owner approval)."
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: "When true, skip dotnet test (workflow wiring smoke only)."
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  chaos:
    name: "Simmy chaos — LLM + SQL + Blob"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Game day context
        run: |
          echo "## Simmy chaos game day" >> "$GITHUB_STEP_SUMMARY"
          echo "- **scenario_id:** ${{ github.event.inputs.scenario_id || 'scheduled' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **environment:** ${{ github.event.inputs.environment || 'staging' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **dry_run:** ${{ github.event.inputs.dry_run || 'false' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runbook: docs/runbooks/GAME_DAY_CHAOS_QUARTERLY.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ArchLucid.sln

      - name: Run chaos tests
        # schedule has no inputs; boolean dispatch inputs may arrive as bool or string — skip only when explicitly true.
        if: ${{ !(github.event.inputs.dry_run == true || github.event.inputs.dry_run == 'true') }}
        run: |
          dotnet test ArchLucid.AgentRuntime.Tests \
            --filter "FullyQualifiedName~Simmy|FullyQualifiedName~Chaos" \
            --logger "trx;LogFileName=chaos-agent.trx"
          dotnet test ArchLucid.Persistence.Tests \
            --filter "FullyQualifiedName~Simmy|FullyQualifiedName~Chaos" \
            --logger "trx;LogFileName=chaos-persistence.trx"

      - name: Upload chaos test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: chaos-test-results
          path: |
            **/chaos-agent.trx
            **/chaos-persistence.trx
