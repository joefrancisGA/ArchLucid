# Build, test, and fail on known vulnerable NuGet packages (NEXT_REFACTORINGS §220).
# Test suites: docs/TEST_EXECUTION_MODEL.md (54R). CI gate = full solution regression + SQL Server for Persistence tests.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: 'LocalTesting123!'
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LocalTesting123!' -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Vulnerable package audit
        run: dotnet list package --vulnerable --include-transitive --output-format json
        # Non-zero exit when any vulnerable package is reported (SDK 6+).

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Context ingestion DI guards
        run: python scripts/assert_context_ingestion_di_guards.py

      - name: Test (54R fast core — fail-fast gate, no SQL container dependency)
        run: dotnet test ArchiForge.sln --no-build -c Release --filter "Suite=Core&Category!=Slow&Category!=Integration"

      - name: Test (54R full regression — entire solution, SQL for Dapper persistence)
        env:
          ARCHIFORGE_SQL_TEST: 'Server=127.0.0.1,1433;User Id=sa;Password=LocalTesting123!;TrustServerCertificate=True;Initial Catalog=ArchiForgePersistenceTests'
        run: dotnet test ArchiForge.sln --no-build -c Release

  operator-ui-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies & run Playwright smoke (54R)
        working-directory: archiforge-ui
        env:
          CI: true
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test
