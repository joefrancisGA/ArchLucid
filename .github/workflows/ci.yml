# Build, test, and fail on known vulnerable NuGet packages (NEXT_REFACTORINGS §220).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Vulnerable package audit
        run: dotnet list package --vulnerable --include-transitive --output-format json
        # Non-zero exit when any vulnerable package is reported (SDK 6+).

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release
