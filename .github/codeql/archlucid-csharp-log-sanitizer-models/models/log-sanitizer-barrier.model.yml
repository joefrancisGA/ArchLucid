extensions:
  # Return value of LogSanitizer.Sanitize is a log-injection barrier (matches LogForgingQuery ExternalLogForgingSanitizer).
  - addsTo:
      pack: codeql/csharp-all
      extensible: barrierModel
    data:
      - ["ArchLucid.Core.Diagnostics", "LogSanitizer", false, "Sanitize", "(System.String)", "", "ReturnValue", "log-injection", "manual"]
